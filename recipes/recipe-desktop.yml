---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: silvercachy-desktop
description: Silverblue image based on BlueBuild's base images with CachyOS kernel and Nvidia (Desktop)
base-image: ghcr.io/blue-build/base-images/fedora-silverblue
image-version: 43

modules:
  # Copy necessary system files
  - type: files
    files:
      - source: system-desktop
        destination: /
      - source: common
        destination: /

  # Set up the base image apps/tools
  - type: dnf
    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
        - gnome-software
        - gnome-tour
        - ptyxis
        - gnome-system-monitor
        - malcontent-control
        - gnome-disk-utility
        - gnome-color-manager
        - yelp
        - gnome-shell-extension-background-logo
        - toolbox
    install:
      skip-unavailable: true
      packages:
        - gamemode
        - adw-gtk3-theme

  # Install AppIndicator and KStatusNotifierItem Gnome Shell extension
  - type: gnome-extensions
    install:
      - 615 

  # Expose audio group to users
  - type: script
    snippets:
      - 'grep -E "^audio:" /usr/lib/group >> /etc/group'

  # Cachyos kernel
  - type: custom-kernel
    source: local
    kernel: cachyos-lto
    initramfs: true
    nvidia: true
    sign: 
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: scachy
    secrets:
    - type: file
      source: ./MOK.priv
      mount: 
        type: file
        destination: /tmp/certs/MOK.priv

  # Cachyos addons
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
    remove:
      packages:
        - zram-generator-defaults
    install:
      skip-unavailable: true
      packages:
        - cachyos-settings
        - scx-scheds
        - scx-tools

  # Needed services
  - type: systemd
    system:
      enabled:
        - podman.socket                 # needed for flatpaks to access toolbox containers
        - flatpak-firstboot.service     # installs the default flatpaks

  # Set OS name
  - type: os-release
    properties:
      DEFAULT_HOSTNAME: silvercachy
      ID: silvercachy
      ID_LIKE: fedora
      NAME: SilverCachy
      PRETTY_NAME: SilverCachy - Fedora Silverblue with CachyOS Kernel (Desktop)

  # Sign container image
  - type: signing
