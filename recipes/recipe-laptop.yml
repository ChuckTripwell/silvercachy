---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: silvercachy-laptop
description: Silverblue image based on BlueBuild's base images with CachyOS kernel (Laptop)
base-image: ghcr.io/blue-build/base-images/fedora-silverblue
image-version: 43

modules:
  # Copy necessary system files
  - type: files
    files:
      - source: system-laptop
        destination: /
      - source: common
        destination: /

  # Minimal base image without extra GUI or CLI tools
  - type: dnf
    remove:
      auto-remove: true
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
        - gnome-software
        - gnome-tour
        - ptyxis
        - gnome-system-monitor
        - malcontent-control
        - gnome-disk-utility
        - gnome-color-manager
        - yelp
        - pipewire-config-raop
        - gnome-shell-extension-background-logo
    install:
      skip-unavailable: true
      packages:
        - adw-gtk3-theme

  # AppIndicator and KStatusNotifierItem Support
  - type: gnome-extensions
    install:
      - 615 

  # Cachyos kernel
  - type: custom-kernel
    source: local
    kernel: cachyos-lto
    initramfs: true
    sign: 
      key: /tmp/certs/MOK.priv
      cert: /usr/share/cert/MOK.pem
      mok-password: scachy
    secrets:
    - type: file
      source: ./MOK.priv
      mount: 
        type: file
        destination: /tmp/certs/MOK.priv

  # Cachyos addons
  - type: dnf
    repos:
      cleanup: true
      copr:
        - bieszczaders/kernel-cachyos-addons
    remove:
      packages:
        - zram-generator-defaults
    install:
      skip-unavailable: true
      packages:
        - cachyos-settings
        - scx-scheds
        - scx-tools

  # Needed services
  - type: systemd
    system:
      enabled:
        - podman.socket                 # needed for flatpaks to access toolbox containers
        - flatpak-firstboot.service     # installs the default flatpaks
        - scx_loader.service            # enables scxsched

  # Set OS name
  - type: os-release
    properties:
      DEFAULT_HOSTNAME: silvercachy
      ID: silvercachy
      ID_LIKE: fedora
      NAME: SilverCachy
      PRETTY_NAME: SilverCachy - Fedora Silverblue with CachyOS Kernel (Laptop)

  - type: signing
